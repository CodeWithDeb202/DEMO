<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a101d"/>
      <stop offset="100%" stop-color="#020305"/>
    </radialGradient>

    <!-- Glow Gradients -->
    <linearGradient id="blueGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>

    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055"/>
      <stop offset="100%" stop-color="#ff3300"/>
    </linearGradient>

    <!-- Text Gradients -->
    <linearGradient id="techTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#d0d8e8"/>
      <stop offset="100%" stop-color="#8a99ad"/>
    </linearGradient>

    <linearGradient id="monsterTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d8ff"/>
      <stop offset="100%" stop-color="#0055cc"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)"/>

  <!-- Outer Ring Elements -->
  <g transform="translate(400, 270)">
    <!-- Tech Base Circles -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#121e36" stroke-width="6"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="#1d2d4a" stroke-width="2" stroke-dasharray="8, 12"/>
    
    <!-- Outer Glow Arcs -->
    <path d="M -200,-60 A 210 210 0 0 1 60,-200" fill="none" stroke="url(#blueGlow)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M -200,-60 A 210 210 0 0 1 60,-200" fill="none" stroke="#00f0ff" stroke-width="4" stroke-linecap="round"/>

    <path d="M 200,60 A 210 210 0 0 1 -60,200" fill="none" stroke="url(#redGlow)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 200,60 A 210 210 0 0 1 -60,200" fill="none" stroke="#ff0055" stroke-width="4" stroke-linecap="round"/>

    <!-- Monitor / Central Graphic -->
    <g transform="translate(0, -15)">
      <!-- Monitor Frame -->
      <rect x="-130" y="-95" width="260" height="165" rx="10" fill="#09111e" stroke="#2a456c" stroke-width="6"/>
      <rect x="-122" y="-87" width="244" height="149" rx="6" fill="#040914" stroke="#00d8ff" stroke-width="1.5" opacity="0.8"/>
      
      <!-- Stand -->
      <path d="M -22,70 L 22,70 L 30,90 L -30,90 Z" fill="#1d2d4a"/>
      <path d="M -40,90 L 40,90 L 50,95 L -50,95 Z" fill="#2a456c"/>

      <!-- Circuit Lines (Left) -->
      <path d="M -110,-20 L -75,-20 L -55,0 L -40,0" fill="none" stroke="#00a8ff" stroke-width="2"/>
      <circle cx="-110" cy="-20" r="3" fill="#00f0ff"/>
      <path d="M -100,-45 L -80,-45 L -65,-30 L -40,-30" fill="none" stroke="#00a8ff" stroke-width="2"/>
      <circle cx="-100" cy="-45" r="3" fill="#00f0ff"/>
      <path d="M -105,15 L -85,15 L -65,30 L -40,30" fill="none" stroke="#00a8ff" stroke-width="2"/>
      <circle cx="-105" cy="15" r="3" fill="#00f0ff"/>

      <!-- Circuit Lines (Right) -->
      <path d="M 110,-20 L 75,-20 L 55,0 L 40,0" fill="none" stroke="#00a8ff" stroke-width="2"/>
      <circle cx="110" cy="-20" r="3" fill="#00f0ff"/>
      <path d="M 100,-45 L 80,-45 L 65,-30 L 40,-30" fill="none" stroke="#00a8ff" stroke-width="2"/>
      <circle cx="100" cy="-45" r="3" fill="#00f0ff"/>
      <path d="M 105,15 L 85,15 L 65,30 L 40,30" fill="none" stroke="#00a8ff" stroke-width="2"/>
      <circle cx="105" cy="15" r="3" fill="#00f0ff"/>

      <!-- Shield -->
      <path d="M 0,-60 L 38,-42 L 38,0 C 38,32 0,52 0,52 C 0,52 -38,32 -38,0 L -38,-42 Z" fill="#0d213a" stroke="#00d8ff" stroke-width="3" filter="url(#glow)"/>
      <path d="M 0,-55 L 32,-38 L 32,0 C 32,27 0,44 0,44 C 0,44 -32,27 -32,0 L -32,-38 Z" fill="none" stroke="#0066ff" stroke-width="1.5"/>

      <!-- Padlock -->
      <rect x="-13" y="-3" width="26" height="20" rx="3" fill="#00d8ff"/>
      <path d="M -8,-3 A 8 8 0 0 1 8,-3 L 8,-8 A 8 8 0 0 0 -8,-8 Z" fill="#00d8ff"/>
      <circle cx="0" cy="5" r="2.5" fill="#09111e"/>
      <path d="M -1.5,5 L 1.5,5 L 2,12 L -2,12 Z" fill="#09111e"/>
    </g>
  </g>

  <!-- Typography Section -->
  <g transform="translate(400, 510)">
    <!-- TECH -->
    <text x="0" y="0" text-anchor="middle" fill="url(#techTextGrad)" font-family="'Impact', 'Arial Black', sans-serif" font-size="105" font-weight="900" letter-spacing="8" stroke="#000" stroke-width="2" style="font-style: italic;">
      TECH
    </text>

    <!-- MONSTER -->
    <text x="0" y="80" text-anchor="middle" fill="url(#monsterTextGrad)" font-family="'Impact', 'Arial Black', sans-serif" font-size="92" font-weight="900" letter-spacing="6" stroke="#002244" stroke-width="2" style="font-style: italic;" filter="url(#glow)">
      MONSTER
    </text>
    <text x="0" y="80" text-anchor="middle" fill="url(#monsterTextGrad)" font-family="'Impact', 'Arial Black', sans-serif" font-size="92" font-weight="900" letter-spacing="6" style="font-style: italic;">
      MONSTER
    </text>

    <!-- Subtitle: CODE. SECURE. SOLVE. -->
    <text x="0" y="145" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI', 'Helvetica', sans-serif" font-size="20" font-weight="700" letter-spacing="8" opacity="0.95">
      CODE. SECURE. SOLVE.
    </text>

    <!-- Symbol: </> -->
    <text x="0" y="190" text-anchor="middle" fill="#00d8ff" font-family="'Courier New', monospace" font-size="34" font-weight="bold" filter="url(#glow)">
      &lt;/&gt;
    </text>
  </g>
</svg>
